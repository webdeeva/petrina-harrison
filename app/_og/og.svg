<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f0e4"/>
      <stop offset="1" stop-color="#efe5d2"/>
    </linearGradient>
    <radialGradient id="orbRouge" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#74282e" stop-opacity="0.32"/>
      <stop offset="0.6" stop-color="#74282e" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#74282e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGold" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d6b27a" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#d6b27a" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#d6b27a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0" stop-color="#74282e" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#74282e" stop-opacity="0"/>
    </radialGradient>

    <!-- Arch clip path for the portrait -->
    <clipPath id="arch">
      <path d="M 0 200
               C 0 60, 60 0, 190 0
               C 320 0, 380 60, 380 200
               L 380 496
               Q 380 520, 356 520
               L 24 520
               Q 0 520, 0 496 Z"/>
    </clipPath>

    <!-- Soft cream bottom wash on portrait -->
    <linearGradient id="creamWash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.6" stop-color="#f7f0e4" stop-opacity="0"/>
      <stop offset="1" stop-color="#f7f0e4" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <!-- Cream background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative orbs -->
  <circle cx="980" cy="60" r="420" fill="url(#orbRouge)"/>
  <circle cx="40" cy="600" r="320" fill="url(#orbGold)"/>

  <!-- ====== RIGHT: portrait arch ====== -->
  <g transform="translate(720,55)">
    <!-- halo glow -->
    <ellipse cx="190" cy="260" rx="240" ry="290" fill="url(#halo)"/>

    <!-- portrait in arch -->
    <g clip-path="url(#arch)">
      <image xlink:href="hero-380.png" x="0" y="0" width="380" height="520" preserveAspectRatio="xMidYMid slice"/>
      <rect width="380" height="520" fill="url(#creamWash)"/>
    </g>

    <!-- arch outer hairline -->
    <path d="M 0 200
             C 0 60, 60 0, 190 0
             C 320 0, 380 60, 380 200
             L 380 496
             Q 380 520, 356 520
             L 24 520
             Q 0 520, 0 496 Z"
          fill="none" stroke="#5a1f24" stroke-opacity="0.25" stroke-width="1"/>

    <!-- inner gold hairline -->
    <path d="M 10 200
             C 10 65, 67 10, 190 10
             C 313 10, 370 65, 370 200
             L 370 486
             Q 370 510, 346 510
             L 34 510
             Q 10 510, 10 486 Z"
          fill="none" stroke="#d6b27a" stroke-opacity="0.65" stroke-width="1"/>
  </g>

  <!-- est. 2003 ribbon (under portrait) -->
  <g transform="translate(820, 596)" font-family="Didot, 'Hoefler Text', serif" font-style="italic" font-size="17">
    <line x1="0" y1="-5" x2="48" y2="-5" stroke="#5a1f24" stroke-opacity="0.35" stroke-width="1"/>
    <text x="58" y="0" fill="#5a1f24" fill-opacity="0.85">est. 2003</text>
    <line x1="138" y1="-5" x2="186" y2="-5" stroke="#5a1f24" stroke-opacity="0.35" stroke-width="1"/>
  </g>

  <!-- ====== LEFT: editorial typography ====== -->

  <!-- Eyebrow -->
  <g transform="translate(80, 100)">
    <text x="0" y="14"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="14"
          font-weight="600"
          fill="#5a1f24"
          letter-spacing="6"
          textLength="232">NO WOMAN LEFT BEHIND</text>
    <line x1="270" y1="9" x2="380" y2="9" stroke="#5a1f24" stroke-opacity="0.4" stroke-width="1"/>
  </g>

  <!-- Headline -->
  <g font-family="Didot, 'Hoefler Text', 'Times New Roman', serif" fill="#3d1418">
    <text x="80" y="220" font-size="78" letter-spacing="-1.5">
      <tspan font-style="italic" font-weight="300">A life </tspan>
      <tspan font-weight="500">devoted</tspan>
    </text>
    <text x="80" y="300" font-size="78" font-weight="500" letter-spacing="-1.5">to the women</text>
    <text x="80" y="380" font-size="78" font-style="italic" font-weight="300" fill="#5a1f24" letter-spacing="-1.5">medicine forgot.</text>
  </g>

  <!-- Floral sprig -->
  <g transform="translate(80, 430)">
    <path d="M0 12 C 28 12, 48 4, 60 12 C 72 20, 92 12, 120 12"
          fill="none" stroke="#5a1f24" stroke-opacity="0.7" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="60" cy="12" r="2.6" fill="#5a1f24"/>
    <circle cx="18" cy="12" r="1.4" fill="#5a1f24"/>
    <circle cx="102" cy="12" r="1.4" fill="#5a1f24"/>
  </g>

  <!-- Name -->
  <g transform="translate(80, 530)">
    <text x="0" y="0" font-family="Didot, 'Hoefler Text', serif" font-size="38" fill="#3d1418">
      <tspan font-style="italic" font-weight="300">Dr. </tspan>
      <tspan font-weight="500">Petrina N. Harrison</tspan>
    </text>
    <text x="0" y="28"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="13"
          font-weight="600"
          fill="#5a1f24"
          letter-spacing="5">DNP · APRN · AGCNS-BC · CIC</text>
  </g>
</svg>
