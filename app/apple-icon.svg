<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bg" cx="0.32" cy="0.28" r="0.95">
      <stop offset="0" stop-color="#74282e"/>
      <stop offset="0.6" stop-color="#5a1f24"/>
      <stop offset="1" stop-color="#3d1418"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#d6b27a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d6b27a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- iOS will round the corners; fill the whole canvas -->
  <rect width="180" height="180" fill="url(#bg)"/>
  <rect width="180" height="180" fill="url(#glow)"/>

  <!-- Inner gold hairline frame -->
  <rect x="14" y="14" width="152" height="152" rx="22"
        fill="none" stroke="#d6b27a" stroke-opacity="0.5" stroke-width="1.4"/>

  <!-- Eyebrow text -->
  <text x="90" y="44"
        text-anchor="middle"
        font-family="ui-sans-serif, Inter, system-ui, sans-serif"
        font-size="7"
        letter-spacing="3"
        fill="#d6b27a"
        font-weight="600">
    DR. PETRINA HARRISON
  </text>

  <!-- Serif P monogram -->
  <g fill="#f7f0e4" transform="translate(0, 8)">
    <!-- vertical stem with serifs -->
    <path d="
      M 70 56
      L 92 56
      L 92 132
      L 98 132
      L 98 140
      L 64 140
      L 64 132
      L 70 132
      Z" />
    <!-- bowl -->
    <path d="
      M 92 56
      L 112 56
      C 132 56, 140 70, 140 86
      C 140 102, 132 114, 112 114
      L 92 114
      L 92 106
      L 110 106
      C 122 106, 130 98, 130 86
      C 130 74, 122 64, 110 64
      L 92 64
      Z" />
  </g>

  <!-- Tagline -->
  <text x="90" y="166"
        text-anchor="middle"
        font-family="ui-serif, Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="11"
        fill="#d6b27a"
        fill-opacity="0.85">
    No Woman Left Behind
  </text>

  <!-- Floral accent dots -->
  <g fill="#d6b27a">
    <circle cx="140" cy="148" r="2.6"/>
    <circle cx="146" cy="152" r="1.6" fill-opacity="0.65"/>
    <circle cx="34" cy="148" r="2.6"/>
    <circle cx="28" cy="152" r="1.6" fill-opacity="0.65"/>
  </g>
</svg>
